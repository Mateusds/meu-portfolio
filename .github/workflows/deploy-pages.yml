name: Deploy Portfolio to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      
      - name: Deploy to AWS via SCP
        uses: appleboy/scp-action@master
        with:
          host: 32.195.183.217
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/var/www/mateusmarquesds" # <--- Pasta do portfólio
          strip_components: 1

      - name: Restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: 32.195.183.217
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sudo systemctl restart nginx